<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; text-align: center; margin-top: 50px; }
        .container { background: white; padding: 20px; max-width: 400px; margin: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { padding: 10px; background: #eee; margin-top: 5px; border-radius: 4px; display: flex; justify-content: space-between; }
        .delete { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>My To-Do List</h2>
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
</div>

<script>
    function addTask() {
        let input = document.getElementById('taskInput');
        let text = input.value.trim();
        if (text === '') return;
        
        let ul = document.getElementById('taskList');
        let li = document.createElement('li');
        li.innerHTML = `${text} <span class="delete" onclick="this.parentElement.remove()">X</span>`;
        
        ul.appendChild(li);
        input.value = '';
    }
</script>

</body>
</html>
